<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clique para Continuar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Impact:wght@400;700&display=swap');

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a0000, #330000, #660000);
            overflow: hidden;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 48px 140px;
            font-size: 2.65rem;
            font-family: 'Impact', sans-serif;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(90deg, #FF2D00, #FF6B00, #FF00B8, #C800FF);
            border: none;
            border-radius: 9999px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 0 90px #FF00FF,
                        0 0 160px #FF4500,
                        0 0 220px #FF1493,
                        inset 0 10px 30px rgba(255,255,255,0.5);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-align: center;
            line-height: 1.05;
            animation: pulse 2.4s infinite ease-in-out; /* Pulsação mais devagar */
            white-space: nowrap;
            -webkit-text-stroke: 3px #000000; /* Linha fina preta em volta das letras */
            text-stroke: 3px #000000;
            paint-order: stroke fill;
        }

        .btn:hover {
            transform: scale(1.08);
        }

        /* Pulsação mais lenta e suave */
        @keyframes pulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.085); }
            100% { transform: scale(1); }
        }

        .btn::before {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: radial-gradient(circle, rgba(255,255,255,0.55) 20%, transparent 70%);
            animation: neonGlow 2.5s linear infinite;
            opacity: 0.45;
        }

        @keyframes neonGlow {
            0%   { transform: translate(20%, 20%); }
            50%  { transform: translate(-20%, -20%); }
            100% { transform: translate(20%, 20%); }
        }
    </style>
</head>
<body>

    <a href="https://toourmarketingef.com?ifMBV=1191270" class="btn" target="_blank">
        CLIQUE AQUI<br>PARA CONTINUAR
    </a>

    <script>
        const button = document.querySelector('.btn');
        button.addEventListener('click', function(e) {
            for(let i = 0; i < 80; i++) {
                const spark = document.createElement('div');
                spark.style.position = 'fixed';
                spark.style.fontSize = '2.3rem';
                spark.style.left = (e.clientX + (Math.random() - 0.5) * 160) + 'px';
                spark.style.top = (e.clientY + (Math.random() - 0.5) * 110) + 'px';
                spark.style.pointerEvents = 'none';
                spark.style.zIndex = '9999';
                spark.textContent = ['🔥','💥','❤️‍🔥','🌟'][Math.floor(Math.random()*4)];
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 1600);
            }
        });
    </script>
</body>
</html>
